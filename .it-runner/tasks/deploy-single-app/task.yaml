name: "deploy-single-app"
description: "Deploy one fixed app to remote (env DEPLOY_SINGLE_APP; recommended with .it-runner/envs/010-local.env)"
tags: ["deploy", "remote", "debug"]
version: "1"
env:
  autoDirs: ["envs"]
  includeSets:
    - "../../envsets/deploy-targets/${ISTOREOS_APP_HUB_DEPLOY_TARGET}"
    - "../../envsets/task-runtimes/deploy-single-app/${ISTOREOS_APP_HUB_SINGLE_APP_PROFILE}"
  required: ["ISTOREOS_APP_HUB_DEPLOY_TARGET", "ISTOREOS_APP_HUB_SINGLE_APP_PROFILE"]
workspace:
  workdir: "."
run:
  cmds:
    - "make deploy-single-app"
